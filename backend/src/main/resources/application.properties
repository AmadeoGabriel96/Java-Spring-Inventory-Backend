server.port=8080

# Usuario fijo para probar la API en local (Spring Security pide Basic Auth en todos los endpoints).
spring.security.user.name=admin
spring.security.user.password=admin

# Configuración PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driverClassName=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# H2 Console desactivado (ya no se usa)
# spring.h2.console.enabled=true

# Desactivar temporalmente la seguridad básica para pruebas
spring.security.user.name=admin
spring.security.user.password=admin

# Permitir que los endpoints no validen CSRF mal formado
spring.main.allow-bean-definition-overriding=true